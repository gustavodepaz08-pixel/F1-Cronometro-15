<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Orbitron', sans-serif;
        }

        .f1-timer-card {
            background: #000;
            border-left: 10px solid #e10600;
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            min-width: 350px;
        }

        .label {
            color: #e10600;
            font-size: 14px;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .display {
            color: #fff;
            font-size: 80px;
            text-shadow: 0 0 20px rgba(225, 6, 0, 0.4);
            margin: 20px 0;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-f1 {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 12px 25px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            flex: 1;
        }

        .btn-f1:hover {
            background: #fff;
            color: #000;
        }

        .btn-f1.pause-btn {
            border-color: #e10600;
            color: #e10600;
        }

        .btn-f1.pause-btn:hover {
            background: #e10600;
            color: #fff;
        }

        .btn-f1:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .f1-logo {
            color: #e10600;
            font-style: italic;
            margin-top: 25px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="f1-timer-card">
    <div class="label">Session Timer</div>
    <div class="display" id="timer">15:00</div>
    
    <div class="controls">
        <button class="btn-f1" id="startBtn" onclick="startTimer()">Pit Start</button>
        <button class="btn-f1 pause-btn" id="pauseBtn" onclick="pauseTimer()" disabled>Box Box</button>
    </div>

    <div class="f1-logo">TIME ATTACK // LIVE TELEMETRY</div>
</div>

<script>
    let timeLeft = 15 * 60;
    let timerId = null;
    let isPaused = false;

    const display = document.getElementById('timer');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    function updateDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        display.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function startTimer() {
        if (timerId !== null) return;
        
        isPaused = false;
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        startBtn.innerText = "Racing...";

        timerId = setInterval(() => {
            if (!isPaused) {
                timeLeft--;
                updateDisplay();

                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    display.style.color = "#e10600";
                    pauseBtn.disabled = true;
                    alert("Checkered Flag! Sesión terminada.");
                }
            }
        }, 1000);
    }

    function pauseTimer() {
        isPaused = !isPaused;
        if (isPaused) {
            pauseBtn.innerText = "Resume";
            display.style.opacity = "0.5";
        } else {
            pauseBtn.innerText = "Box Box";
            display.style.opacity = "1";
        }
    }
</script>

</body>
</html>
